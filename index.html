<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羊羊的专属电台</title>
    <style>
        :root { --spotify-green: #1DB954; --spotify-black: #121212; --spotify-grey: #181818; }
        body { background-color: var(--spotify-black); color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* 锁定状态的全屏样式 */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--spotify-black);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; text-align: center;
        }

        .countdown-timer { font-size: 48px; font-weight: bold; color: var(--spotify-green); margin: 20px 0; }

        /* 播客主体内容 - 默认隐藏 */
        #main-content { display: none; flex-direction: column; align-items: center; width: 100%; }

        /* 顶部导航 */
        .header { width: 100%; padding: 20px; font-size: 14px; font-weight: bold; color: #b3b3b3; text-align: center; }

        /* 播客封面 */
        .album-art { width: 280px; height: 280px; margin-top: 40px; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); background: linear-gradient(45deg, #333, #1DB954); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .album-art img { width: 100%; height: 100%; object-fit: cover; }

        /* 文字说明 */
        .info { text-align: center; margin-top: 30px; padding: 0 20px; }
        .info h1 { font-size: 28px; margin: 0; }
        .info p { color: #b3b3b3; font-size: 16px; margin-top: 10px; }

        /* 播放控制栏 */
        .player-controls { width: 90%; max-width: 400px; background: var(--spotify-grey); margin-top: auto; margin-bottom: 40px; padding: 20px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; }
        
        audio { width: 100%; margin: 15px 0; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }

        /* 心跳小动画 */
        .playing-icon { display: flex; gap: 3px; margin-top: 15px; }
        .bar { width: 3px; height: 15px; background: var(--spotify-green); animation: bounce 1s infinite alternate; }
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { from { height: 5px; } to { height: 20px; } }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="header">🐑 专属电台待解锁...</div>
        <div id="countdown-msg" style="font-size: 18px; color: #b3b3b3;">距离惊喜开启还有</div>
        <div id="timer" class="countdown-timer">00:00:00:00</div>
        <p style="font-size: 14px; color: #666;">还没到时间哦，晚点再回来看看呀～✨</p>
    </div>

    <div id="main-content">
        <div class="header">🐑 WINDY’S SPECIAL PODCAST</div>

        <div class="album-art">
            <img src="cover.JPG" onerror="this.src='https://via.placeholder.com/300?text=LOVE'" alt="Cover"> 
        </div>

        <div class="info">
            <h1>想和你说的悄悄话</h1>
            <p>EP01 - 那些关于我们的故事</p>
            <p style="font-size: 14px; opacity: 0.8;">“我们一起庆祝的第二次的生日✨”</p>
        </div>

        <div class="playing-icon">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="player-controls">
            <audio id="myAudio" controls>
                <source src="story.m4a" type="audio/mp4">
                浏览器不支持音频播放。
            </audio>
            <p style="font-size: 12px; color: #b3b3b3;">正在播放：小彤同学的悄悄话.m4a</p>
        </div>
    </div>

<script>
    // --- 1. 设置解锁时间 ---
    // 格式：年, 月(从0开始, 所以4月写3), 日, 时, 分, 秒
    const unlockTime = new Date(2024, 3, 26, 0, 0, 0).getTime();

    function updateTimer() {
        const now = new Date().getTime();
        const distance = unlockTime - now;

        if (distance > 0) {
            // 还没到时间，计算并显示倒计时
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("timer").innerText = 
                `${days}天 ${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
            
            requestAnimationFrame(updateTimer);
        } else {
            // 时间到了！执行密码校验
            checkPassword();
        }
    }

    // --- 2. 密码校验逻辑 ---
    function checkPassword() {
        // 先移除倒计时界面
        document.getElementById("lock-screen").style.display = "none";
        
        let pw = prompt("生日快乐！请输入解锁暗号：");
        
        if (pw === "0426Ainiya520") {
            // 密码正确，显示主内容
            document.getElementById("main-content").style.display = "flex";
            alert("解锁成功，欢迎收听你的专属电台 🎧");
        } else {
            // 密码错误
            alert("暗号不对哦，或许跟盒子有关？");
            location.reload(); // 刷新页面重新输入
        }
    }

    // 启动时间检查
    updateTimer();
</script>

</body>
</html>
